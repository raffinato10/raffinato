<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Banner Desktop — 1920×700</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 700px; overflow: hidden; background: #000; }

.banner {
  width: 1920px;
  height: 700px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  background: linear-gradient(128deg,
    #5E0710 0%,
    #9A0E1D 22%,
    #C41526 50%,
    #A81120 75%,
    #5E0710 100%
  );
}

/* Textura diagonal sutil */
.texture {
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    -52deg,
    transparent 0px,
    transparent 30px,
    rgba(0,0,0,0.055) 30px,
    rgba(0,0,0,0.055) 32px
  );
  pointer-events: none;
}

/* Faixas douradas topo e base */
.gold-top {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 7px;
  background: linear-gradient(90deg, transparent 0%, #E8B830 15%, #E8B830 85%, transparent 100%);
  z-index: 20;
}
.gold-bottom {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 7px;
  background: linear-gradient(90deg, transparent 0%, #E8B830 15%, #E8B830 85%, transparent 100%);
  z-index: 20;
}

/* Círculos decorativos */
.circle-xl {
  position: absolute;
  right: -40px;
  top: -140px;
  width: 860px;
  height: 860px;
  border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,0.07);
  background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 65%);
}
.circle-md {
  position: absolute;
  right: 180px;
  bottom: -260px;
  width: 580px;
  height: 580px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.06);
}
.circle-sm {
  position: absolute;
  left: -80px;
  top: -80px;
  width: 380px;
  height: 380px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.05);
}

/* Divisor vertical elegante */
.divider {
  position: absolute;
  left: 860px;
  top: 60px;
  bottom: 60px;
  width: 1.5px;
  background: linear-gradient(180deg, transparent, rgba(255,255,255,0.2) 30%, rgba(255,255,255,0.2) 70%, transparent);
}

/* Brilho dourado atrás do hamburguer */
.hamburger-glow {
  position: absolute;
  right: 95px;
  top: 50%;
  transform: translateY(-50%);
  width: 680px;
  height: 680px;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(232,184,48,0.14) 0%,
    rgba(200,30,50,0.06) 55%,
    transparent 72%
  );
}

/* ── CONTEÚDO ESQUERDO ── */
.content {
  position: absolute;
  left: 145px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10;
  max-width: 680px;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: #E8B830;
  color: #5E0710;
  font-family: 'Montserrat', sans-serif;
  font-size: 17px;
  font-weight: 900;
  letter-spacing: 3.5px;
  padding: 9px 24px;
  text-transform: uppercase;
  margin-bottom: 24px;
  border-radius: 3px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.badge-star { font-size: 11px; }

.headline-pre {
  font-family: 'Bebas Neue', 'Impact', sans-serif;
  font-size: 60px;
  color: rgba(255,255,255,0.78);
  letter-spacing: 5px;
  text-transform: uppercase;
  line-height: 1;
  margin-bottom: 2px;
}

.headline-main {
  font-family: 'Bebas Neue', 'Impact', sans-serif;
  font-size: 168px;
  color: #FFFFFF;
  letter-spacing: -3px;
  text-transform: uppercase;
  line-height: 0.82;
  margin-bottom: 26px;
  text-shadow:
    0 6px 32px rgba(0,0,0,0.45),
    0 2px 0 rgba(0,0,0,0.4);
}

.condition {
  font-family: 'Montserrat', sans-serif;
  font-size: 30px;
  font-weight: 500;
  color: rgba(255,255,255,0.86);
  margin-bottom: 46px;
  line-height: 1.35;
  letter-spacing: 0.3px;
}
.condition em {
  font-style: normal;
  color: #E8B830;
  font-weight: 700;
}

.cta {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  background: #E8B830;
  color: #5E0710;
  font-family: 'Montserrat', sans-serif;
  font-size: 22px;
  font-weight: 900;
  padding: 20px 48px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  box-shadow:
    0 10px 28px rgba(0,0,0,0.35),
    0 2px 0 rgba(200,150,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.3);
}

/* ── HAMBURGUER (direita) ── */
.hamburger-wrap {
  position: absolute;
  right: 58px;
  top: 50%;
  transform: translateY(-54%);
  z-index: 10;
  filter: drop-shadow(0 22px 48px rgba(0,0,0,0.55));
}
</style>
</head>
<body>
<div class="banner">
  <div class="texture"></div>
  <div class="gold-top"></div>
  <div class="gold-bottom"></div>
  <div class="circle-xl"></div>
  <div class="circle-md"></div>
  <div class="circle-sm"></div>
  <div class="divider"></div>
  <div class="hamburger-glow"></div>

  <!-- ── Conteúdo esquerdo ── -->
  <div class="content">
    <div class="badge">
      <span class="badge-star">✦</span>
      Offre Spéciale
      <span class="badge-star">✦</span>
    </div>
    <div class="headline-pre">1 Menu Enfant</div>
    <div class="headline-main">OFFERT</div>
    <div class="condition">
      à partir de <em>40€</em> d'achat
    </div>
    <div class="cta">
      Profiter de l'offre &nbsp;→
    </div>
  </div>

  <!-- ── Hamburguer SVG ── -->
  <div class="hamburger-wrap">
    <svg viewBox="0 0 520 455" width="610" height="535"
         xmlns="http://www.w3.org/2000/svg" overflow="visible">
      <defs>
        <radialGradient id="dTopBun" cx="42%" cy="30%" r="68%">
          <stop offset="0%"   stop-color="#F2BC40"/>
          <stop offset="55%"  stop-color="#D49418"/>
          <stop offset="100%" stop-color="#9A6A06"/>
        </radialGradient>
        <radialGradient id="dBotBun" cx="50%" cy="22%" r="72%">
          <stop offset="0%"   stop-color="#EEAA22"/>
          <stop offset="100%" stop-color="#9A6606"/>
        </radialGradient>
        <radialGradient id="dPatty" cx="50%" cy="32%" r="70%">
          <stop offset="0%"   stop-color="#5E2E10"/>
          <stop offset="100%" stop-color="#220A02"/>
        </radialGradient>
        <linearGradient id="dCheese" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#FFE458"/>
          <stop offset="100%" stop-color="#F0B81A"/>
        </linearGradient>
        <radialGradient id="dShadow" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="rgba(0,0,0,0.5)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
        </radialGradient>
        <filter id="dDS" x="-18%" y="-18%" width="136%" height="136%">
          <feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="rgba(0,0,0,0.45)"/>
        </filter>
        <filter id="dGlow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Sombra no chão -->
      <ellipse cx="260" cy="444" rx="200" ry="16" fill="url(#dShadow)"/>

      <!-- PÃOZINHO INFERIOR -->
      <g filter="url(#dDS)">
        <ellipse cx="260" cy="394" rx="188" ry="30" fill="url(#dBotBun)"/>
        <path d="M72,386 Q260,416 448,386 L448,398 Q260,422 72,398 Z" fill="#825206"/>
      </g>

      <!-- HAMBÚRGUER (patty) -->
      <g filter="url(#dDS)">
        <rect x="68" y="330" width="384" height="56" rx="9" fill="url(#dPatty)"/>
        <!-- Marcas de grelha -->
        <line x1="118" y1="332" x2="118" y2="382" stroke="rgba(0,0,0,0.48)" stroke-width="7"/>
        <line x1="172" y1="332" x2="172" y2="382" stroke="rgba(0,0,0,0.48)" stroke-width="7"/>
        <line x1="226" y1="332" x2="226" y2="382" stroke="rgba(0,0,0,0.48)" stroke-width="7"/>
        <line x1="280" y1="332" x2="280" y2="382" stroke="rgba(0,0,0,0.48)" stroke-width="7"/>
        <line x1="334" y1="332" x2="334" y2="382" stroke="rgba(0,0,0,0.48)" stroke-width="7"/>
        <line x1="388" y1="332" x2="388" y2="382" stroke="rgba(0,0,0,0.48)" stroke-width="7"/>
        <!-- Highlight do patty -->
        <path d="M68,340 Q260,332 452,340" stroke="rgba(160,80,30,0.45)" stroke-width="3" fill="none"/>
      </g>

      <!-- QUEIJO -->
      <path d="M58,326 L462,326 L480,302 L60,302 Z" fill="url(#dCheese)" filter="url(#dDS)"/>
      <!-- Escorridos de queijo -->
      <path d="M58,326 Q50,315 60,302 Q55,316 60,326 Z" fill="#FFDE50"/>
      <path d="M462,326 Q470,315 460,302 Q465,316 460,326 Z" fill="#FFDE50"/>
      <path d="M128,326 Q122,340 130,352" stroke="#F0B818" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M392,326 Q398,340 390,352" stroke="#F0B818" stroke-width="5" fill="none" stroke-linecap="round"/>

      <!-- TOMATE -->
      <g filter="url(#dDS)">
        <ellipse cx="172" cy="296" rx="96" ry="14" fill="#C81818"/>
        <ellipse cx="172" cy="292" rx="68" ry="8"  fill="#E02424" opacity="0.55"/>
        <ellipse cx="360" cy="293" rx="88" ry="13" fill="#C81818"/>
        <ellipse cx="360" cy="289" rx="60" ry="7"  fill="#E02424" opacity="0.55"/>
      </g>

      <!-- ALFACE -->
      <path d="M26,287
        Q50,265 75,280 Q100,258 126,275 Q152,256 178,273
        Q204,255 230,272 Q256,255 282,272 Q308,255 334,273
        Q360,256 386,272 Q412,255 438,272 Q462,260 494,278
        L494,292 L26,292 Z"
        fill="#2A8E22" filter="url(#dDS)"/>
      <path d="M26,287 Q50,268 75,283 Q100,262 126,278 Q152,259 178,276 Q204,259 230,275
               Q256,259 282,275 Q308,259 334,277 Q360,260 386,276 Q412,259 438,275 Q462,264 494,281"
        stroke="#1E7018" stroke-width="2" fill="none" opacity="0.7"/>

      <!-- PÃOZINHO SUPERIOR (cúpula) -->
      <g filter="url(#dDS)">
        <path d="M76,288 Q76,112 260,90 Q444,112 444,288 Z" fill="url(#dTopBun)"/>
        <!-- Sombra da cúpula -->
        <path d="M76,288 Q76,118 260,96 Q444,118 444,288"
              stroke="rgba(0,0,0,0.14)" stroke-width="2.5" fill="none"/>
        <!-- Brilho superior -->
        <ellipse cx="208" cy="168" rx="82" ry="38" fill="rgba(255,255,255,0.22)" transform="rotate(-18,208,168)"/>
        <ellipse cx="196" cy="156" rx="40" ry="18" fill="rgba(255,255,255,0.14)" transform="rotate(-18,196,156)"/>
      </g>

      <!-- GERGELINS -->
      <g fill="rgba(255,255,255,0.94)">
        <ellipse cx="182" cy="156" rx="17" ry="7.5" transform="rotate(-28,182,156)"/>
        <ellipse cx="230" cy="130" rx="17" ry="7.5" transform="rotate(-8,230,130)"/>
        <ellipse cx="284" cy="136" rx="16" ry="7"   transform="rotate(13,284,136)"/>
        <ellipse cx="332" cy="156" rx="15" ry="7"   transform="rotate(26,332,156)"/>
        <ellipse cx="258" cy="164" rx="14" ry="6"   transform="rotate(-4,258,164)"/>
      </g>

      <!-- VAPOR -->
      <g fill="none" stroke-linecap="round" opacity="0.58">
        <path d="M185,82 Q173,60 186,38 Q199,16 186,-4"
              stroke="rgba(255,255,255,0.82)" stroke-width="5.5"/>
        <path d="M260,70 Q246,46 260,24 Q274,2 260,-18"
              stroke="rgba(255,255,255,0.9)"  stroke-width="7"/>
        <path d="M335,80 Q348,58 335,36 Q322,14 336,-6"
              stroke="rgba(255,255,255,0.82)" stroke-width="5.5"/>
      </g>
    </svg>
  </div>
</div>
</body>
</html>
